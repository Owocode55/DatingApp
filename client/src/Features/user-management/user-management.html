<div class="h-[75vh] overflow-auto rounded-box border border-base-content/5 bg-base-100">
  <table class="table">
    <thead>
      <tr>
        <th>Email</th>
        <th>Active roles</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
        @for (user of userList(); track user.id){
          <tr>
            <td>{{user.email}}</td>
            <td>{{user.roles}}</td>
            <td><button (click)="openModal(user)" class="btn btn-primary">Edit roles</button></td>
          </tr>
        }
    </tbody>
  </table>
</div>

<dialog #roleModal class="modal">
    <div class="modal-box">
        <h3 class="font-bold text-primary">Edit Role for {{selectedUser?.email}}</h3>
        <fieldset class="fieldset w-full p-4 bg-base-100 border border-base-300 rounded-box">
          <legend class="fieldset-legend">Select roles</legend>
          @for(role of avilableRoles; track $index){
             <label class="fieldset-label">
               <input type="checkbox" (change)="toggleRole($event, role)" [checked]="selectedUser?.roles?.includes(role)" />
               {{role}}
             </label>
          }
        </fieldset>
        <div class="modal-action">
      <button (click)="updateRoles()" class="btn btn-primary">Submit</button>
    </div>
    </div>
    
  <form method="dialog" class="modal-backdrop">
    <button>close</button>
    
  </form>
</dialog>
