@if (!memberService.showMemberUpdateForm()) {
  <!--  @if (photos$ | async; as photos) { -->
  @if (photos(); as photos) {
    @if (photos.length > 0) {
      <div class="grid grid-cols-5 auto-row-min gap-3 h-[65vh] p-5 overflow-auto">
        @for (photo of photos; track photo.id) {
          <div class="relative">
            <img src="{{ photo.url }}" alt="image" class="w-full rounded-lg" />
            @if (accountService.currentUser()?.id == memberService.member()?.id) {
              <app-delete-icon-button
                class="absolute top-1 left-1"
                (clickEvent)="onDeletePhoto(photo)"
                [isDisabled]="photo.url === memberService.member()?.imageUrl"
              />
              <app-overflow-icon-button
                (click)="setMainPhoto(photo)"
                [isCurrentPhoto]="photo.url === memberService.member()?.imageUrl"
              />
            }
          </div>
        }
      </div>
    } @else {
      <p class="text-center text-gray-500">No photos available</p>
    }
  }
} @else {
  <app-image-upload
    (uploadFile)="onUploadPhoto($event)"
    [isLoading]="isLoading()"
  ></app-image-upload>
}
