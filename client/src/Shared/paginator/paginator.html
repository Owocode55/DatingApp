<div class="flex items-center w-full gap-3 py-3">
  <span>Items per page</span>
  <select class="select w-24" (change)="onPageChange(undefined, $event.target)">
    @for (option of pageSizeOptions(); track $index) {
      <option [value]="option" [selected]=" option === pageSize()">{{option}}</option>
    }
  </select>

  <div class="text-sm">
    {{ (pageNumber() - 1) * pageSize() + 1 }} - {{ lastIndex() }} of {{ totalCount() }}
  </div>
  <div class="flex items-center gap-2">
    <button class="btn btn-circle btn-ghost" [disabled]="pageNumber() === 1" (click)="onPageChange(pageNumber() - 1)">&larr;</button>
    <button class="btn btn-circle btn-ghost" [disabled]="(pageNumber() * pageSize() >= totalCount() )" (click)="onPageChange(pageNumber() + 1)">&rarr;</button>
 

</div>
</div>
